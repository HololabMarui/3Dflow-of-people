<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CSV → CZML ミニマム変換</title>
  <style>
    :root {
      --bg-1: #fff8ff;
      --bg-2: #eef8ff;
      --panel: rgba(255,255,255,0.86);
      --panel-strong: rgba(255,255,255,0.96);
      --text: #3d2b54;
      --muted: #7c6994;
      --line: #ead7ff;
      --accent: #ff5fa2;
      --accent-2: #7b61ff;
      --accent-3: #34d3ff;
      --accent-4: #ffd166;
      --ok: #10b981;
      --shadow: 0 18px 48px rgba(123, 97, 255, 0.16);
      --radius-xl: 28px;
      --radius-lg: 18px;
      --radius-md: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, "Hiragino Sans", "Yu Gothic UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #ffd6eb 0, transparent 28%),
        radial-gradient(circle at top right, #d7f0ff 0, transparent 24%),
        linear-gradient(160deg, var(--bg-1), var(--bg-2));
      min-height: 100vh;
    }

    .shell {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }

    .hero {
      padding: 30px;
      border-radius: 32px;
      background: linear-gradient(135deg, rgba(255,255,255,0.94), rgba(255,255,255,0.78));
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.7);
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto -60px -70px auto;
      width: 220px;
      height: 220px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(255,95,162,0.22), rgba(123,97,255,0));
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255,95,162,0.14), rgba(52,211,255,0.15));
      color: var(--accent-2);
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.02em;
    }

    h1 {
      margin: 16px 0 10px;
      font-size: clamp(30px, 4vw, 48px);
      line-height: 1.08;
    }

    .lead {
      margin: 0;
      max-width: 700px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 22px;
      margin-top: 24px;
    }

    .card {
      background: var(--panel);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.8);
      box-shadow: var(--shadow);
      border-radius: var(--radius-xl);
      padding: 24px;
    }

    .card h2 {
      margin: 0 0 18px;
      font-size: 22px;
    }

    .stack { display: grid; gap: 16px; }

    label {
      display: grid;
      gap: 8px;
      font-weight: 700;
      font-size: 14px;
    }

    .hint {
      font-weight: 500;
      color: var(--muted);
      font-size: 12px;
    }

    input[type="text"],
    input[type="number"],
    input[type="file"],
    textarea {
      width: 100%;
      border: 2px solid transparent;
      border-radius: var(--radius-md);
      padding: 14px 16px;
      font: inherit;
      color: var(--text);
      background: var(--panel-strong);
      box-shadow: inset 0 0 0 1px var(--line);
      transition: 0.18s ease;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: rgba(123,97,255,0.35);
      box-shadow: inset 0 0 0 1px rgba(123,97,255,0.2), 0 0 0 5px rgba(123,97,255,0.08);
    }

    textarea {
      min-height: 140px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      line-height: 1.6;
    }

    .toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: linear-gradient(135deg, rgba(255,95,162,0.10), rgba(123,97,255,0.08));
      border-radius: var(--radius-lg);
      padding: 16px 18px;
      border: 1px solid rgba(255,255,255,0.7);
    }

    .switch {
      position: relative;
      width: 58px;
      height: 34px;
      flex: 0 0 auto;
    }

    .switch input {
      position: absolute;
      opacity: 0;
      inset: 0;
      cursor: pointer;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: #d7c8f6;
      border-radius: 999px;
      transition: 0.2s ease;
      box-shadow: inset 0 0 0 1px rgba(123,97,255,0.12);
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 26px;
      height: 26px;
      left: 4px;
      top: 4px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      transition: 0.2s ease;
    }

    .switch input:checked + .slider {
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }

    .switch input:checked + .slider::before {
      transform: translateX(24px);
    }

    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 6px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.18s ease, opacity 0.18s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .primary {
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 14px 28px rgba(255,95,162,0.24);
    }

    .secondary {
      color: var(--accent-2);
      background: linear-gradient(135deg, rgba(123,97,255,0.10), rgba(52,211,255,0.14));
      box-shadow: 0 12px 24px rgba(52,211,255,0.15);
    }

    .mini {
      display: grid;
      gap: 12px;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chip {
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.78);
      border: 1px solid var(--line);
      font-size: 13px;
      color: var(--muted);
    }

    .status {
      padding: 16px;
      border-radius: var(--radius-lg);
      background: rgba(255,255,255,0.8);
      border: 1px dashed var(--line);
      line-height: 1.7;
      white-space: pre-wrap;
      min-height: 110px;
    }

    .status.ok {
      border-style: solid;
      border-color: rgba(16,185,129,0.3);
      background: rgba(16,185,129,0.08);
    }

    .status.ng {
      border-style: solid;
      border-color: rgba(255,95,162,0.28);
      background: rgba(255,95,162,0.08);
    }

    .footer-note {
      margin-top: 16px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
    }

    @media (max-width: 860px) {
      .grid, .row-2 { grid-template-columns: 1fr; }
      .shell { padding: 20px 14px 40px; }
      .hero, .card { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div class="badge">✨ Pop Mini Launcher</div>
      <h1>CSV → CZML ミニマム変換</h1>
      <p class="lead">
        HAE版の変換スクリプトを、まずは軽いUIから呼び出すための最小画面です。
        CSVを選んで、出力名と Path 表示だけ調整して実行できます。
      </p>
    </section>

    <div class="grid">
      <section class="card">
        <h2>変換設定</h2>
        <form id="mainForm" class="stack">
          <label>
            CSVファイル
            <span class="hint">deviceID / log_ts / longitude / latitude / altitude_hae を含むCSV</span>
            <input type="file" id="csv_file" name="csv_file" accept=".csv" required>
          </label>

          <div class="row-2">
            <label>
              出力CZML名
              <input type="text" id="output_name" name="output_name" value="output.czml" placeholder="output.czml">
            </label>
            <label>
              trail 秒
              <input type="number" id="trail" name="trail" value="30" min="0" step="1">
            </label>
          </div>

          <div class="toggle">
            <div>
              <div style="font-weight:800; margin-bottom:4px;">Path を表示する</div>
              <div class="hint">ON のとき `--show-path --trail N` を付けます</div>
            </div>
            <label class="switch" aria-label="show path">
              <input type="checkbox" id="show_path" name="show_path" checked>
              <span class="slider"></span>
            </label>
          </div>

          <div class="actions">
            <button type="button" class="secondary" id="previewBtn">コマンドを確認</button>
            <button type="submit" class="primary">変換を実行</button>
          </div>
        </form>

        <div class="footer-note">
          今は HAE 専用の最小版です。色や見た目だけポップ寄りにしていますが、機能は絞っています。
        </div>
      </section>

      <aside class="card mini">
        <h2>プレビュー</h2>
        <div class="chip-row">
          <div class="chip">HAE</div>
          <div class="chip">show-path</div>
          <div class="chip">trail</div>
          <div class="chip">command preview</div>
        </div>

        <label>
          生成コマンド
          <textarea id="commandPreview" readonly placeholder="ここに実行コマンドが表示されます"></textarea>
        </label>

        <label>
          実行結果
          <div id="resultBox" class="status">まだ実行していません。</div>
        </label>
      </aside>
    </div>
  </div>

  <script>
    const form = document.getElementById('mainForm');
    const previewBtn = document.getElementById('previewBtn');
    const commandPreview = document.getElementById('commandPreview');
    const resultBox = document.getElementById('resultBox');

    function getPreviewPayload() {
      const fileInput = document.getElementById('csv_file');
      return new URLSearchParams({
        filename: fileInput.files[0] ? fileInput.files[0].name : 'input.csv',
        output_name: document.getElementById('output_name').value,
        show_path: document.getElementById('show_path').checked ? 'true' : 'false',
        trail: document.getElementById('trail').value,
      });
    }

    async function updatePreview() {
      const response = await fetch('/preview-command', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: getPreviewPayload().toString(),
      });
      const data = await response.json();
      if (!response.ok || !data.ok) {
        commandPreview.value = data.error || 'コマンド生成に失敗しました。';
        return;
      }
      commandPreview.value = data.command;
    }

    previewBtn.addEventListener('click', async () => {
      await updatePreview();
    });

    form.addEventListener('change', async () => {
      await updatePreview();
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      await updatePreview();

      const fd = new FormData();
      const fileInput = document.getElementById('csv_file');
      if (fileInput.files[0]) {
        fd.append('csv_file', fileInput.files[0]);
      }
      fd.append('output_name', document.getElementById('output_name').value);
      fd.append('show_path', document.getElementById('show_path').checked ? 'true' : 'false');
      fd.append('trail', document.getElementById('trail').value);

      resultBox.className = 'status';
      resultBox.textContent = '実行中...';

      const response = await fetch('/run', { method: 'POST', body: fd });
      const data = await response.json();
      const lines = [
        `return code: ${data.returncode}`,
        `command: ${data.command || ''}`,
        `output: ${data.output_path || ''}`,
        '',
        '[stdout]',
        data.stdout || '(empty)',
        '',
        '[stderr]',
        data.stderr || '(empty)',
      ];
      resultBox.textContent = lines.join('\n');
      resultBox.className = data.ok ? 'status ok' : 'status ng';
    });

    updatePreview();
  </script>
</body>
</html>
